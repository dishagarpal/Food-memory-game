<!DOCTYPE html>
<html>
<head>
  <title>Food Memory Match 🍔</title>
  <link rel="stylesheet" href="style.css">
</head>s
<body>

<h1>🍩 Food Memory Match</h1>

<div id="stats">
  Moves: <span id="moves">0</span> |
  Time: <span id="time">0</span>s |
  Best: <span id="best">-</span>
</div>

<div id="controls">
  <button onclick="startGame(4)">Easy</button>
  <button onclick="startGame(6)">Medium</button>
  <button onclick="startGame(8)">Hard</button>
  <button onclick="restartGame()">Restart</button>
</div>

<div id="game"></div>

<!-- 🎉 Win Popup -->
<div id="winPopup" class="hidden">
  <h2>🎉 You Won!</h2>
  <p id="finalStats"></p>
  <button onclick="restartGame()">Play Again</button>
</div>

<script src="script.js"></script>
</body>
</html>
